apiVersion: v1
kind: Pod
metadata:
  name: dev-pod
spec:
  containers:
  - name: gpu
    image: pytorch/pytorch:2.5.1-cuda12.1-cudnn9-runtime
    command: ["sleep", "infinity"]
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 16Gi
        cpu: "4"
      requests:
        nvidia.com/gpu: 1
        memory: 16Gi
        cpu: "4"
    volumeMounts:
    - mountPath: /data
      name: project-data
    - mountPath: /dev/shm
      name: dshm
  volumes:
  - name: project-data
    persistentVolumeClaim:
      claimName: project-data
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 8Gi