# train_job_github.yaml
#
# Training job that pulls the latest code from GitHub on every pod
# startup via an init container. Repo is PUBLIC so no SSH key needed.
#
# Workflow:
#   1. git push  (local)
#   2. kubectl apply -f train_job_github.yaml
#   3. Init container clones/pulls latest code automatically
#   4. Training runs, checkpoints saved to PVC
#
# Update REPO_URL below to your actual repo before submitting.

apiVersion: v1
kind: Pod
metadata:
  name: vbm-train
  namespace: hdsi-schwartzman
spec:
  restartPolicy: Never

  # ── init container: pull latest code from GitHub ─────────────────
  initContainers:
  - name: git-sync
    image: alpine/git
    command:
    - sh
    - -c
    - |
      REPO_URL="https://github.com/whitebabycamel96/brain-age-cnn.git"
      BRANCH="autoenocder_age"
      TMP_DIR="/tmp/repo"

      if [ -d "$TMP_DIR/.git" ]; then
        echo "repo exists — pulling latest from $BRANCH ..."
        cd $TMP_DIR && git fetch origin && git checkout $BRANCH && git pull origin $BRANCH
      else
        echo "cloning branch $BRANCH ..."
        git clone --branch $BRANCH $REPO_URL $TMP_DIR
      fi

      echo "code at commit: $(cd $TMP_DIR && git log --oneline -1)"

      echo "copying repo contents to /data ..."
      cp -r $TMP_DIR/. /data/
      echo "done"

    volumeMounts:
    - name: vbm-storage
      mountPath: /data

  # ── main training container ──────────────────────────────────────
  containers:
  - name: trainer
    image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
    command:
    - bash
    - -c
    - |
      export PIP_TARGET=/data/pip_packages &&
      export PYTHONPATH=/data/pip_packages:$PYTHONPATH &&
      pip install -r /data/requirements.txt --quiet --target=$PIP_TARGET --upgrade-strategy only-if-needed &&
      cd /data &&
      python train.py --config config.json

    resources:
      requests:
        memory: "16Gi"
        cpu: "4"
        nvidia.com/gpu: "1"
      limits:
        memory: "32Gi"
        cpu: "8"
        nvidia.com/gpu: "1"

    volumeMounts:
    - name: vbm-storage
      mountPath: /data

    env:
    - name: PYTHONUNBUFFERED
      value: "1"

  volumes:
  - name: vbm-storage
    persistentVolumeClaim:
      claimName: vbm-ae-pvc

  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule