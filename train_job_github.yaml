apiVersion: v1
kind: Pod
metadata:
  name: vbm-train
  namespace: hdsi-schwartzman
spec:
  restartPolicy: Never
  initContainers:
  - name: git-sync
    image: alpine/git
    command:
    - sh
    - -c
    - |
      REPO_URL="https://github.com/whitebabycamel96/brain-age-cnn.git"
      BRANCH="autoenocder_age"
      CODE_DIR="/data"

      if [ -d "$CODE_DIR/.git" ]; then
        echo "repo exists — pulling latest from $BRANCH ..."
        cd $CODE_DIR && git fetch origin && git checkout $BRANCH && git pull origin $BRANCH
      else
        echo "cloning branch $BRANCH into /data ..."
        git clone --branch $BRANCH $REPO_URL $CODE_DIR
      fi

      echo "code at commit: $(cd $CODE_DIR && git log --oneline -1)"

    volumeMounts:
    - name: vbm-storage
      mountPath: /data

  containers:
  - name: trainer
    image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
    command:
    - bash
    - -c
    - |
      pip install scikit-learn optuna --quiet &&
      cd /data &&
      python train.py --config config.json
    resources:
      requests:
        memory: "16Gi"
        cpu: "4"
        nvidia.com/gpu: "1"
      limits:
        memory: "32Gi"
        cpu: "8"
        nvidia.com/gpu: "1"
    volumeMounts:
    - name: vbm-storage
      mountPath: /data
    env:
    - name: PYTHONUNBUFFERED
      value: "1"

  volumes:
  - name: vbm-storage
    persistentVolumeClaim:
      claimName: vbm-ae-pvc

  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
