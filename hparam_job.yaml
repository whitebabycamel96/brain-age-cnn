# hparam_job.yaml
#
# Runs Optuna hyperparameter search on a GPU on Nautilus.
# Init container pulls latest code from GitHub before search starts.
#
# Submit:
#   kubectl apply -f hparam_job.yaml
#
# Watch logs:
#   kubectl logs -f vbm-hparam -c searcher
#
# If pod crashes mid-search, resubmit — Optuna resumes from last trial.
#
# Copy results locally when done:
#   kubectl cp vbm-hparam:/data/hparam_search/ ./hparam_search/

apiVersion: v1
kind: Pod
metadata:
  name: vbm-hparam
  namespace: hdsi-schwartzman
spec:
  restartPolicy: Never

  # ── init container: pull latest code from GitHub ─────────────────
  initContainers:
  - name: git-sync
    image: alpine/git
    command:
    - sh
    - -c
    - |
      REPO_URL="https://github.com/whitebabycamel96/brain-age-cnn.git"
      BRANCH="autoenocder_age"
      TMP_DIR="/tmp/repo"

      if [ -d "$TMP_DIR/.git" ]; then
        echo "repo exists — pulling latest from $BRANCH ..."
        cd $TMP_DIR && git fetch --depth 1 origin $BRANCH && git reset --hard origin/$BRANCH
      else
        echo "cloning branch $BRANCH ..."
        git clone --branch $BRANCH --depth 1 $REPO_URL $TMP_DIR
      fi

      echo "code at commit: $(cd $TMP_DIR && git log --oneline -1)"

      echo "copying repo contents to /data ..."
      cp -r $TMP_DIR/. /data/
      echo "done"

    volumeMounts:
    - name: vbm-storage
      mountPath: /data

  # ── hparam search container ───────────────────────────────────────
  containers:
  - name: searcher
    image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
    command:
    - bash
    - -c
    - |
      export PIP_TARGET=/data/pip_packages &&
      export PYTHONPATH=/data/pip_packages:$PYTHONPATH &&
      pip install -r /data/requirements.txt --quiet --target=$PIP_TARGET --upgrade-strategy only-if-needed &&
      cd /data &&
      python hparam_search.py \
        --config config.json \
        --trials 20 \
        --epochs-per-trial 20 \
        --study-name vbm_ae_search

    resources:
      requests:
        memory: "16Gi"
        cpu: "4"
        nvidia.com/gpu: "1"
      limits:
        memory: "32Gi"
        cpu: "8"
        nvidia.com/gpu: "1"

    volumeMounts:
    - name: vbm-storage
      mountPath: /data

    env:
    - name: PYTHONUNBUFFERED
      value: "1"

  volumes:
  - name: vbm-storage
    persistentVolumeClaim:
      claimName: vbm-ae-pvc

  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule